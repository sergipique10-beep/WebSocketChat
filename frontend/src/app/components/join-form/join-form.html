<div class="join-container">
  <h1>ChatWS</h1>
  <form (ngSubmit)="join()">
    <input
      type="text"
      [(ngModel)]="username"
      name="username"
      placeholder="Tu nombre..."
      autocomplete="off"
    />

    <p class="label">Elegí un tema para chatear:</p>
    <div class="chips">
      @for (af of aficiones; track af) {
        <button
          type="button"
          class="chip"
          [class.selected]="selectedRoom === af"
          (click)="selectRoom(af)"
        >{{ af }}</button>
      }
    </div>

    <input
      type="text"
      [(ngModel)]="customRoom"
      name="customRoom"
      placeholder="O escribí tu propio tema..."
      autocomplete="off"
      (ngModelChange)="onCustomRoomChange()"
    />

    <button type="submit" [disabled]="!canJoin">Unirse</button>
  </form>
</div>
