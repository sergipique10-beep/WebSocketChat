<div class="lotr-bg">
  <div class="ember-bg">
    @for (e of embers; track $index) {
      <span class="ember"
        [style.left.%]="e.x"
        [style.width.px]="e.size"
        [style.height.px]="e.size"
        [style.animationDuration.s]="e.duration"
        [style.animationDelay.s]="e.delay"
        [style.background]="e.color">
      </span>
    }
  </div>
  <div class="register-card">

    <div class="rune-border">
      <div class="card-inner">
        <div class="header">
          <div class="eye-symbol">◉</div>
          <h1 class="title">ChatWS</h1>
          <p class="subtitle">Crónicas de la Tierra Media</p>
          <div class="divider">— ⟐ —</div>
        </div>

        <p class="lore">
          "Un Anillo para gobernarlos a todos,<br>
          un Chat para encontrarlos."
        </p>

        <form (ngSubmit)="join()">
          <div class="field">
            <label>Tu nombre en la Comarca</label>
            <input type="text" [(ngModel)]="username" name="username"
              placeholder="Frodo, Aragorn, Legolas..." autocomplete="off"/>
          </div>

          <div class="field">
            <label>Pergamino de contacto (correo)</label>
            <input type="email" [(ngModel)]="email" name="email"
              placeholder="heroe&#64;tierramedia.com" autocomplete="off"/>
          </div>

          <div class="field">
            <label>Elige tu Concilio</label>
            <div class="chips">
              @for (af of aficiones; track af) {
                <button type="button" class="chip"
                  [class.selected]="selectedRoom === af"
                  (click)="selectRoom(af)">
                  {{ af }}
                </button>
              }
            </div>
            <input type="text" [(ngModel)]="customRoom" name="customRoom"
              placeholder="O forja tu propio concilio..."
              autocomplete="off" (ngModelChange)="onCustomRoomChange()"/>
          </div>

          @if (error()) {
            <p class="error-msg">⚠ {{ error() }}</p>
          }

          <button type="submit" class="btn-join" [disabled]="!canJoin">
            @if (loading()) { Invocando... } @else { Unirse al Concilio }
          </button>
        </form>
      </div>
    </div>

  </div>
</div>
