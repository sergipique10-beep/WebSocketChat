services:
  - type: web
    name: chatwS-backend
    env: python
    buildCommand: cd frontend && npm ci && npm run build -- --configuration production && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: STATIC_DIR
        value: ../frontend/dist/frontend/browser
